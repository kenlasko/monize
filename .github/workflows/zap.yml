name: OWASP ZAP Baseline

# Nightly DAST against a freshly-built e2e stack. Catches runtime issues that
# Bearer and CodeQL miss (missing/misconfigured security headers, exposed
# admin endpoints, CSRF gaps, cookie flags). Findings are filed as a GitHub
# issue automatically.

on:
  schedule:
    # 04:00 UTC daily - after demo-mode resets but before any real users.
    - cron: '0 4 * * *'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Default to read-only at the workflow level; the scan job opts into
# issue-write access so the ZAP action can file a findings issue automatically.
permissions:
  contents: read

jobs:
  zap-baseline:
    name: ZAP baseline scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write # so zaproxy/action-baseline can file the findings issue
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
        with:
          persist-credentials: false

      - name: Build application images
        # docker-compose.zap.yml overlays the e2e stack to run the frontend as a
        # production build (the dev/Turbopack image inflates the scan with
        # unsafe-eval, unminified vendor chunks and verbose 404s that never ship
        # to users). Scanning the production image reflects what is deployed.
        run: docker compose -f docker-compose.e2e.yml -f docker-compose.zap.yml build

      - name: Start application stack
        run: docker compose -f docker-compose.e2e.yml -f docker-compose.zap.yml up -d --wait --wait-timeout 600

      - name: ZAP baseline scan
        uses: zaproxy/action-baseline@de8ad967d3548d44ef623df22cf95c3b0baf8b25 # v0.15.0
        with:
          target: http://localhost:3001
          rules_file_name: .github/zap/rules.tsv
          cmd_options: '-a -j -T 10'
          issue_title: 'ZAP Baseline Report'
          fail_action: false

      - name: Stop services
        if: always()
        run: docker compose -f docker-compose.e2e.yml -f docker-compose.zap.yml down -v
